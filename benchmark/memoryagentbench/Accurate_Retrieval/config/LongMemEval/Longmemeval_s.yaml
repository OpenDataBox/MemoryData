# Data/Task configuration
dataset: Accurate_Retrieval
chunk_size: 4096
debug: false
seed: 42

# specific configuration
context_max_length: 150000
# The current local MemoryAgentBench release only ships the LongMemEval source
# under metadata.source == "longmemeval_s*". We keep this smaller config as a
# 150k truncation variant of that source rather than referencing the missing
# legacy name "longmemeval_s_-1_500".
sub_dataset: longmemeval_s*
generation_max_length: 50
test_files: ''
demo_files: ''
use_chat_template: true
max_test_samples: 5
shots: 0
tag: null
