# -- required ---------------------------------------------------------------
agent_name: Structure_rag_mem0
model: Qwen3-8B
mem0_embedder_model: Qwen3-Embedding-4B    # was Qwen/Qwen3-Embedding-4B; local 9009 service exposes the deployed short name
temperature: 0.7
input_length_limit: 10000000
buffer_length: 1000
output_dir: ./results/outputs/Qwen3-8B-mem0
agent_chunk_size: 4096    # deprecated for Mem0 runtime behavior; kept for benchmark harness path/tag compatibility
retrieve_num: 100

# -- optional (LLM) ---------------------------------------------------------
provider: openai_compatible    # openai(default) | openai_compatible | azure_openai
api_key_env: OPENAI_API_KEY    # env var name for API key (default: OPENAI_API_KEY)
base_url: http://127.0.0.1:9909/v1    # custom LLM endpoint
base_url_env:       # env var name for base_url
azure_endpoint:
azure_api_version:
tokenizer_encoding: cl100k_base  # e.g. cl100k_base

# -- optional (embedding endpoint) -----------------------------------------
embedding_api_key_env: OPENAI_API_KEY    # env var name for embedding API key
embedding_base_url: http://127.0.0.1:9009/v1    # custom embedding endpoint
embedding_base_url_env:   # env var name for embedding_base_url

# -- optional (prompt overrides) -------------------------------------------
mem0_fact_extraction_prompt:   # override the benchmark-selected fact extraction template
mem0_memory_answer_prompt:     # override the benchmark-selected answer template
