# ── required ──────────────────────────────────────────────────────────────────
agent_name: Structure_rag_zep_local
model: Qwen3-8B
temperature: 0.7
input_length_limit: 10000000
buffer_length: 5000
output_dir: ./results/outputs/Qwen3-8B-zep_local
agent_chunk_size: 4096
retrieve_num: 10

# ── optional (chat backend) ───────────────────────────────────────────────────
provider: openai_compatible    # openai(default) | openai_compatible | azure_openai
api_key_env: OPENAI_API_KEY    # env var name for API key (default: OPENAI_API_KEY)
base_url: http://127.0.0.1:9909/v1    # custom LLM endpoint
base_url_env:       # env var name for base_url
azure_endpoint:
azure_api_version:
tokenizer_encoding: cl100k_base  # e.g. cl100k_base

# ── optional (Graphiti extraction / rerank backend) ───────────────────────────
zep_local_small_model: Qwen3-8B    # keep Graphiti extraction aligned with the lane 2 chat service
zep_local_llm_temperature: 0.0    # keep Graphiti extraction deterministic for structured outputs
zep_local_llm_max_tokens: 512    # avoid Graphiti's overly large default on 32k local models
zep_local_episode_max_chars: 3000    # split long non-dialogue chunks into smaller Graphiti episodes

# ── optional (embedding backend for Graphiti) ─────────────────────────────────
text_embedding: Qwen3-Embedding-4B
embedding_api_key_env: OPENAI_API_KEY
embedding_base_url: http://127.0.0.1:9009/v1
embedding_base_url_env:
embedding_dim: 2560

# ── optional (local graph store) ──────────────────────────────────────────────
neo4j_uri: bolt://localhost:7687
neo4j_user: neo4j
neo4j_password: neo4jneo4j

# ── optional (answer generation backend) ──────────────────────────────────────
zep_local_answer_model: Qwen3-8B    # keep answer synthesis aligned with the lane 2 chat service
zep_local_answer_api_key_env: OPENAI_API_KEY    # was implicit; defaults to api_key_env
zep_local_answer_base_url: http://127.0.0.1:9909/v1    # was implicit; defaults to base_url
zep_local_answer_temperature: 0.0    # was upstream default
zep_local_answer_max_tokens: 200    # was upstream default
