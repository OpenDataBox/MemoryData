agent_name: Embedding_rag_qwen3_embedding_4b
model: Qwen3-8B
temperature: 0.7
input_length_limit: 30000    # was 10000000; capped for local 32768-token backend
buffer_length: 4000    # was 200; keep extra room because cl100k_base underestimates local Qwen token counts
output_dir: ./results/outputs/Qwen3-8B-qwen3_embedding_4b

retrieve_num: 10
embedding_model: Qwen3-Embedding-4B
embedding_provider: openai_compatible    # openai(default) | openai_compatible | azure_openai
embedding_api_key_env: OPENAI_API_KEY    # env var name for embedding API key
embedding_base_url: http://127.0.0.1:9009/v1    # custom embedding endpoint

# ── optional (LLM) ────────────────────────────────────────────────────────────
provider: openai_compatible    # openai(default) | openai_compatible | azure_openai
api_key_env: OPENAI_API_KEY    # env var name for API key (default: OPENAI_API_KEY)
base_url: http://127.0.0.1:9908/v1    # custom LLM endpoint
base_url_env:       # env var name for base_url
azure_endpoint:
azure_api_version:
tokenizer_encoding: cl100k_base  # e.g. cl100k_base
